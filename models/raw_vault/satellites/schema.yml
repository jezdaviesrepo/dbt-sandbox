version: 2

models:
  - name: sat_customer
    description: Satellite table for Customer details, containing descriptive attributes and tracking changes over time in the Data Vault model
    constraints:
      - type: foreign_key
        columns:
          - customer_hk
        expression: REIGATE_MESH.RAW_VAULT.hub_customer (customer_hk)
        name: fk_sat_customer_hub_customer
    columns:
      - name: customer_hk
        data_type: binary(16)
        description: Hash key linking to the Customer Hub table, representing the unique business entity
      - name: load_date
        data_type: timestamp_ltz(9)
        description: Timestamp indicating when this specific customer record version was loaded into the data vault
      - name: c_custkey
        data_type: number(38,0)
        description: Original business key for the customer from the source system
      - name: c_name
        data_type: varchar(25)
        description: Full name of the customer
      - name: c_address
        data_type: varchar(40)
        description: Complete postal address of the customer
      - name: c_nationkey
        data_type: number(38,0)
        description: Foreign key referencing the nation of the customer
      - name: c_phone
        data_type: varchar(15)
        description: Contact phone number for the customer
      - name: c_acctbal
        data_type: number(12,2)
        description: Customers account balance
      - name: c_mktsegment
        data_type: varchar(10)
        description: Market segment classification for the customer
      - name: c_comment
        data_type: varchar(117)
        description: Additional comments or notes about the customer
      - name: customer_nation_lhk
        data_type: binary(16)
        description: Link hash key connecting the customer to their associated nation
      - name: customer_hashdiff
        data_type: binary(16)
        description: Hash difference used to track and identify changes in customer attributes
      - name: record_source
        data_type: varchar(23)
        description: Source system or process that supplied this customer record version

